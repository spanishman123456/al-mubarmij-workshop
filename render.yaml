# Render Blueprint — static SPA (Vite + React Router)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: al-mubarmij-workshop
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
